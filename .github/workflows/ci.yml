name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: Typecheck, test, and pack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Pack dry-run
        run: npm pack --dry-run
